---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    force: true
driver:
  name: docker
platforms:
  - name: woodpecker-ci-server-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        woodpecker_ci_server_debug_service_enabled: false

        # Variables for Woodpecker CI server
        woodpecker_ci_server_uid: 1000
        woodpecker_ci_server_gid: 1000
        woodpecker_ci_server_scheme: http
        woodpecker_ci_server_hostname: localhost
        woodpecker_ci_server_container_labels_traefik_enabled: false
        woodpecker_ci_server_http_bind_port: 8000
        woodpecker_ci_server_database_type: mysql
        woodpecker_ci_server_provider: gitea
        woodpecker_ci_server_config_agent_secret: secret
        woodpecker_ci_server_config_gitea_url: https://example.com
        woodpecker_ci_server_config_gitea_client: client
        woodpecker_ci_server_config_gitea_secret: secret

        # Variables required for Woodpecker CI server to connect to the MariaDB database (via Unix socket)
        woodpecker_ci_server_database_mysql_hostname: "{{ woodpecker_ci_server_database_mysql_socket_path_container + '/mysqld.sock' }}"
        woodpecker_ci_server_database_mysql_username: my_database_username
        woodpecker_ci_server_database_mysql_password: my_database_password
        woodpecker_ci_server_database_name: woodpecker_ci_server
        woodpecker_ci_server_database_mysql_socket_enabled: true
        woodpecker_ci_server_database_mysql_socket_path_host: "{{ mariadb_run_path }}"
        woodpecker_ci_server_systemd_required_services_list_auto: |
          {{
            (['mariadb.service'])
          }}

        # Variables for MariaDB
        mariadb_uid: 1000
        mariadb_gid: 1000
        mariadb_root_password: mariadb_password
        mariadb_container_unix_socket_enabled: true
        mariadb_managed_databases: |
          {{
            [{
              'name': woodpecker_ci_server_database_name,
              'username': woodpecker_ci_server_database_mysql_username,
              'password': woodpecker_ci_server_database_mysql_password,
            }]
          }}
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-mariadb
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
